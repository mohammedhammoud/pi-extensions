name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Publish local model options
        run: npm run publish:local-model-options
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
